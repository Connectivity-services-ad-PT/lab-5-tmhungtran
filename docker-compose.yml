services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: team-notify-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-notify_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-notify_pass_123}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - team-internal
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  notify-api:
    build:
      context: ./src/notify_app
      dockerfile: Dockerfile
    image: smart-campus/notify-api:v0.1.0-team-notify
    container_name: team-notify-api
    env_file:
      - .env.example
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-notify_user}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-notify_pass_123}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-notifications}
      PARTNER_SERVICE_URL: ${PARTNER_SERVICE_URL}
    ports:
      - "8000:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - team-internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  notify-worker:
    build:
      context: ./src/worker
      dockerfile: Dockerfile
    image: smart-campus/notify-worker:v0.1.0-team-notify
    container_name: team-notify-worker
    env_file:
      - .env.example
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-notify_user}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-notify_pass_123}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-notifications}
      SMTP_DUMMY_TOKEN: ${SMTP_DUMMY_TOKEN:-dummy-smtp-token}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - team-internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  team-internal:
    name: team-internal
    driver: bridge

volumes:
  rabbitmq-data:
